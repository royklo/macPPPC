name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make PPPC Builder more useful? Describe it here.
        For requests to add a new app to the built-in **Known Apps** list, please use the "Add a known app" template instead — it has dedicated fields for the bundle ID and code requirement.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. We're more interested in the *why* than the *how*.
      placeholder: "e.g. I have to generate the same profile for 30 apps and would like a way to bulk-import them from a CSV."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? UI sketches or examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve the same problem, including doing nothing.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      description: PPPC Builder is intentionally a zero-build, fully client-side tool. Features that would require a backend, account, or external API are unlikely to be accepted.
      options:
        - label: This feature can be implemented entirely client-side (no server, no external API)
          required: true
