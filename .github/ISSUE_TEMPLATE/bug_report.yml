name: Bug report
description: Something in PPPC Builder isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can — it makes the fix faster.
        PPPC Builder runs entirely in your browser; no data leaves your machine, so issues are usually reproducible from a clean profile.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A short description of the bug.
      placeholder: e.g. "Uploading a .zip of Notes.app produces an empty permissions list."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so we can reproduce it locally.
      placeholder: |
        1. Go to https://www.simsenblog.dk/pppc-builder/
        2. Click "Upload .zip"
        3. Select Notes.app.zip
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include any error messages from the browser console (Cmd-Opt-J in Chrome, Cmd-Opt-C in Safari Web Inspector).
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Safari
        - Chrome
        - Edge
        - Firefox
        - Arc
        - Other
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: "e.g. Safari 17.5, Chrome 126"

  - type: input
    id: macos
    attributes:
      label: macOS version (the version of macOS you're generating the profile for)
      placeholder: "e.g. macOS 14.5 Sonoma"

  - type: textarea
    id: profile
    attributes:
      label: Generated profile (optional)
      description: If relevant, paste the generated `.mobileconfig` XML so we can see what was produced. **Remove any internal-only Code Requirement strings or app identifiers if they're sensitive.**
      render: xml

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Drag-and-drop screenshots here.
